<!doctype html>
<html lang="th">
<head>
  <link rel="stylesheet" href="theme.css">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>โหมดวันครบรอบ 💍💚💜</title>
  <style>
    :root{
      --bg1:#0b1220; --bg2:#1a0f2e;
      --mint:#7CFFB2; --lav:#B88CFF;
      --card:#ffffff10; --line:#ffffff26;
      --text:#ffffff; --muted:#ffffffb3;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; color:var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(1200px 700px at 20% 10%, #2b7a4a55 0%, transparent 60%),
        radial-gradient(1100px 700px at 80% 20%, #6b2bb255 0%, transparent 55%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }
    .wrap{max-width:980px;margin:0 auto;padding:34px 18px 24px}
    .card{
      border:1px solid var(--line); background:var(--card);
      border-radius:22px; padding:16px;
      backdrop-filter: blur(12px);
      box-shadow:0 18px 60px #00000033;
      max-width:900px;
    }
    .badge{
      display:inline-flex; gap:8px; align-items:center;
      padding:8px 12px; border-radius:999px;
      border:1px solid var(--line);
      background:#ffffff12; color:var(--muted);
      font-size:13px;
    }
    h1{margin:10px 0 0;font-size:clamp(30px,4.8vw,56px)}
    .sub{color:var(--muted);line-height:1.8;margin:10px 0 0;white-space:pre-wrap;font-size:17px}
    .img{
      margin-top:14px;
      width:100%;
      aspect-ratio:16/9;
      border-radius:22px;
      border:1px solid var(--line);
      overflow:hidden;
      background:#ffffff10;
      position:relative;
    }
    .img img{width:100%;height:100%;object-fit:cover;display:block}
    .overlay{
      position:absolute; inset:0;
      background: linear-gradient(180deg, transparent 55%, #00000066 100%);
      pointer-events:none;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    a,button{
      border:1px solid var(--line);
      background:#ffffff14;
      color:var(--text);
      padding:12px 14px;
      border-radius:14px;
      text-decoration:none;
      font-weight:900;
      cursor:pointer;
      display:inline-flex; gap:8px; align-items:center;
      transition:.18s transform,.18s background;
    }
    a:hover,button:hover{transform:translateY(-1px);background:#ffffff20}
    .primary{
      border:none;
      background: linear-gradient(135deg, var(--mint), var(--lav));
      color:#0b1220;
    }
    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
      border:1px dashed #ffffff55;
      border-radius:18px;
      padding:12px;
      background:#00000022;
    }
    .spark{
      position:fixed; left:0; top:0;
      pointer-events:none; opacity:.9;
      transform:translate(-50%,-50%);
      filter:drop-shadow(0 6px 10px #00000055);
      animation:pop linear forwards;
    }
    @keyframes pop{
      from{transform:translate(var(--x),var(--y)) scale(1); opacity:.9}
      to{transform:translate(calc(var(--x) + var(--dx)), calc(var(--y) - 220px)) scale(.85); opacity:0}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 id="title">Happy Anniversary, ครีม 💚💜</h1>

      <div class="img">
        <!-- ใส่รูปวันครบรอบใน assets/anniversary.png -->
        <img src="assets/anniversary.png" alt="anniversary" onerror="this.style.display='none'">
        <div class="overlay"></div>
      </div>

      <div class="sub" id="msg"></div>

      <div class="row">
        <button class="primary" id="celebrate">กดฉลองหน่อย ✨</button>
        <a href="q1.html">กลับไปคำถาม 1</a>
        <a href="index.html">กลับหน้าเกม</a>
      </div>

      <div class="hint">
        วิธีแก้ไขหน้านี้:
        - เปลี่ยนข้อความในตัวแปร <b>ANN_TEXT</b> ด้านล่าง
        - ใส่รูปวันครบรอบที่ <b>assets/anniversary.png</b> (หรือเปลี่ยนชื่อไฟล์ในโค้ด)
      </div>
    </div>
  </div>

  <script>
    // === ปรับข้อความวันครบรอบตรงนี้ ===
    const ANN_TEXT = [
      "ถึงครีม 💚💜",
      "",
      "หน้านี้ตั้งใจทำไว้ “รอวันครบรอบของเรา”",
      "วันที่ถึงวันนั้นจริง ๆ ค่อยเปิดมาอ่านนะ 🙂",
      "",
      "ขอบคุณที่อยู่ด้วยกันเสมอ",
      "รักมาก ๆ เลย",
      "",
      "— จากคนที่รักครีม"
    ].join("\n");
    document.getElementById("msg").textContent = ANN_TEXT;

    // เอฟเฟกต์ฉลอง
    function confetti(x,y){
      const arr = ["💚","💜","✨","💖","🌟","💍"];
      for(let i=0;i<28;i++){
        setTimeout(()=>{
          const s=document.createElement("div");
          s.className="spark";
          s.textContent=arr[Math.floor(Math.random()*arr.length)];
          s.style.setProperty("--x", x+"px");
          s.style.setProperty("--y", y+"px");
          s.style.setProperty("--dx", (Math.random()*180-90).toFixed(1)+"px");
          s.style.animationDuration=(900+Math.random()*900)+"ms";
          document.body.appendChild(s);
          setTimeout(()=>s.remove(),1800);
        }, i*16);
      }
    }

    document.getElementById("celebrate").addEventListener("click", ()=>{
      confetti(window.innerWidth/2, window.innerHeight/3);
    });
  </script>
</body>
</html>
